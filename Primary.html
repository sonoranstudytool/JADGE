    <style>      
      /* Reset margins so the grid fits the full screen */
      body {
        background-color: black; }

        .grid-table {
          display: grid;
          /* Middle column is 2x the size of the outer columns */
          grid-template-columns: 1fr 2fr 1fr; 
          gap: 5px;
          height: 100vh; /* Adjust height as needed */
        }
        
        .column {
          padding: 1px;
          border: 1px solid blue;
        }
        
        .right {
          display: grid;
          /* Middle row is 3x the size of the top and bottom rows */
          grid-template-rows: 1fr 3fr 1fr;
          gap: 1px;
          padding: 0; /* Remove padding to let rows fill the space */
        }
        
        .row {
          display: flex;
          align-items: center;
          justify-content: center;
          border: 1px solid blue;
        }
    </style>
  </head>
