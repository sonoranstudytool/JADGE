<html>
  <head>
    <style>
      /* Reset margins so the grid fits the full screen */
      body {
        background-color: black; }

        .grid-table {
          display: grid;
          /* Middle column is 2x the size of the outer columns */
          grid-template-columns: 1fr 2fr 1fr; 
          gap: 10px;
          height: 100vh; /* Adjust height as needed */
        }
        
        .column {
          padding: 20px;
          border: 1px solid blue;
        }
        
        .right {
          display: grid;
          /* Middle row is 3x the size of the top and bottom rows */
          grid-template-rows: 1fr 3fr 1fr;
          gap: 1px;
          padding: 0; /* Remove padding to let rows fill the space */
        }
        
        .row {
          display: flex;
          align-items: center;
          justify-content: center;
          border: 1px solid blue;
        }
    </style>
  </head>

  <body>
    <div class="grid-table">
      <div class="column left"> 
        <iframe src="PAGE1.html" style="border:none;"> </iframe>
      </div>
      
      <div class="column middle">Middle Column (2x Larger)</div>
      <div class="column right">
        <div class="row top">Top Row</div>
        <div class="row middle-row">Middle Row (2x Larger)</div>
        <div class="row bottom">Bottom Row</div>
      </div>
    </div>
  </body>
</html>
