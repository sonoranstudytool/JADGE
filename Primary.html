<html>
  <head>
    <style>
      /* Reset margins so the grid fits the full screen */
      body {
        background-color: black; }

        .parent-grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr 2fr 1fr); /* 3 unequal columns */
          border-collapse: collapse;
          border: 1px solid blue;
          padding: 10px;
          height: 100vh;
          width: 100vw; }
        
        .right-col {
          display: grid;
          grid-template-rows: 1fr 3fr 1fr; /* Divide right col into 3 unequal rows */
          border-collapse: collapse;
          border: 1px solid blue; }

    </style>
  </head>

  <body>
    <div class="parent-grid">
      <div class="col"> 
          <button> Left Column </button> 
      </div>
      
      <div class="col">
          <button> Middle Column </button> 
      </div>
      
      <div class="right-col">
        <div>
          <button> Row 1 </button> 
        </div>
        <div>
          <button> Row 2 </button> 
        </div>
        <div>
          <button> Row 3 </button> 
        </div>
      </div>
    </div>
  </body>
</html>
