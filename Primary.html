<html>
  <head>
    <style>
      /* Reset margins so the grid fits the full screen */
      body {
        background-color: black;
        color: white;
        margin: 0;
        padding: 0;
        height: 100%; }

        .parent-grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr); /* 3 equal columns */
          border: 1px solid blue;
          padding: 10px;
          height: 300px;
          /* height: 100vh;
          width: 100vw; */ }
        
        .right-col {
          display: grid;
          grid-template-rows: repeat(3, 1fr); /* Divide right col into 3 rows */
          border: 1px solid blue; }

    </style>
  </head>

  <body>
    <div class="parent-grid">
      <div class="col"> 
          <button> Left Column </button> 
      </div>
      
      <div class="col">
          <button> Middle Column </button> 
      </div>
      
      <div class="right-col">
        <div>
          <button> Row 1 </button> 
        </div>
        <div>
          <button> Row 2 </button> 
        </div>
        <div>
          <button> Row 3 </button> 
        </div>
      </div>
    </div>
  </body>
</html>
